- name: 'Manage Apache Webserver Deployment'
  hosts: all
  become: false
  gather_facts: false
  remote_user: "{{ remote_user }}"
  tasks:
    - name: 'Install the Apache Webserver'
      package:
        name: "{{ apache_svc }}"
        state: 'present'
    - name: 'Ensure web server is running and enabled'
      service:
        name: "{{ apache_svc }}"
        state: 'started'
        enabled: true
    - name: 'Copy web content'
      copy:
        dest: '/var/www/html/index.html'
        src: 'index.html'
